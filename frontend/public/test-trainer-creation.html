<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Trainer Creation Debug Test</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #111827;
            color: #e5e7eb;
            padding: 20px;
        }
        .container { max-width: 900px; margin: 0 auto; }
        h1, h2 { color: #fbbf24; margin-top: 20px; margin-bottom: 10px; }
        .card {
            background: #1f2937;
            border: 1px solid #374151;
            border-radius: 8px;
            padding: 16px;
            margin-bottom: 16px;
        }
        .status { 
            display: inline-block; 
            padding: 4px 12px; 
            border-radius: 4px; 
            font-size: 12px;
            font-weight: bold;
        }
        .status.success { background: #059669; color: white; }
        .status.error { background: #dc2626; color: white; }
        .status.pending { background: #f59e0b; color: white; }
        input, button, textarea {
            background: #374151;
            color: #e5e7eb;
            border: 1px solid #4b5563;
            padding: 8px 12px;
            border-radius: 4px;
            font-size: 14px;
            font-family: monospace;
        }
        button {
            cursor: pointer;
            background: #1f2937;
            border: 1px solid #fbbf24;
            color: #fbbf24;
            padding: 10px 16px;
            margin-top: 10px;
            margin-right: 10px;
        }
        button:hover { background: #fbbf24; color: #1f2937; }
        textarea { width: 100%; height: 150px; font-size: 12px; resize: vertical; }
        .test-results { margin-top: 20px; }
        .test-row { display: flex; gap: 10px; align-items: center; margin: 8px 0; }
        .test-label { width: 200px; }
        .test-value { flex: 1; word-break: break-all; }
    </style>
</head>
<body>
    <div class="container">
        <h1>🔧 Trainer Creation Debug Test</h1>
        <p style="color: #9ca3af; margin-bottom: 20px;">Testing the full flow: Login → Create Trainer</p>

        <div class="card">
            <h2>Step 1: Admin Login</h2>
            <div>
                <label>Email: <input type="text" id="email" value="admin@gym.com" style="width: 300px;"></label>
            </div>
            <div>
                <label>Password: <input type="password" id="password" value="password" style="width: 300px;"></label>
            </div>
            <button onclick="testLogin()">Test Login</button>
            <div id="loginStatus" class="test-row" style="margin-top: 10px; display: none;">
                <span class="test-label">Status:</span>
                <span id="loginStatusValue"></span>
            </div>
        </div>

        <div class="card">
            <h2>Step 2: Create Trainer</h2>
            <div style="color: #d1d5db; font-size: 14px; margin-bottom: 10px;">
                (Only available after successful login)
            </div>
            <div>
                <label>First Name: <input type="text" id="firstName" value="Test" style="width: 250px;"></label>
            </div>
            <div>
                <label>Last Name: <input type="text" id="lastName" value="Trainer" style="width: 250px;"></label>
            </div>
            <div>
                <label>Email: <input type="text" id="trainerEmail" value="" placeholder="auto-generated" style="width: 250px;"></label>
            </div>
            <div>
                <label>Phone: <input type="text" id="phone" value="555-NEW" style="width: 250px;"></label>
            </div>
            <div>
                <label>Specialization: <input type="text" id="specialization" value="Testing" style="width: 250px;"></label>
            </div>
            <div>
                <label>Hourly Rate: <input type="number" id="hourlyRate" value="100" style="width: 250px;"></label>
            </div>
            <button onclick="testCreateTrainer()">Test Trainer Creation</button>
            <div id="trainerStatus" class="test-row" style="margin-top: 10px; display: none;">
                <span class="test-label">Status:</span>
                <span id="trainerStatusValue"></span>
            </div>
        </div>

        <div class="card">
            <h2>Debug Information</h2>
            <h3>LocalStorage Content:</h3>
            <textarea id="storageContent" readonly></textarea>
            <button onclick="updateStorageDisplay()">Refresh Storage Display</button>

            <h3 style="margin-top: 16px;">API Call Details:</h3>
            <textarea id="apiDetails" readonly></textarea>
        </div>

        <div class="card">
            <h2>Request/Response Log</h2>
            <textarea id="log" readonly></textarea>
            <button onclick="clearLog()">Clear Log</button>
        </div>
    </div>

    <script>
        function log(message) {
            const logEl = document.getElementById('log');
            const timestamp = new Date().toLocaleTimeString();
            logEl.value += `[${timestamp}] ${message}\n`;
            logEl.scrollTop = logEl.scrollHeight;
        }

        function clearLog() {
            document.getElementById('log').value = '';
        }

        function updateStorageDisplay() {
            const storage = {};
            for (let i = 0; i < localStorage.length; i++) {
                const key = localStorage.key(i);
                storage[key] = localStorage.getItem(key);
            }
            document.getElementById('storageContent').value = JSON.stringify(storage, null, 2);
        }

        async function testLogin() {
            log('=== TESTING LOGIN ===');
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;

            try {
                log(`Attempting login with ${email}...`);
                const response = await fetch('/api/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email, password })
                });

                log(`Response status: ${response.status}`);
                const data = await response.json();
                log(`Response: ${JSON.stringify(data, null, 2)}`);

                if (data.success && data.data.token) {
                    localStorage.setItem('token', data.data.token);
                    log(`✓ Token saved to localStorage`);
                    
                    const status = document.getElementById('loginStatus');
                    status.style.display = 'flex';
                    document.getElementById('loginStatusValue').textContent = 'SUCCESS - Token stored';
                    document.getElementById('loginStatusValue').className = 'status success';
                    
                    updateStorageDisplay();
                } else {
                    throw new Error(data.message || 'Login failed');
                }
            } catch (error) {
                log(`✗ Error: ${error.message}`);
                const status = document.getElementById('loginStatus');
                status.style.display = 'flex';
                document.getElementById('loginStatusValue').textContent = `ERROR: ${error.message}`;
                document.getElementById('loginStatusValue').className = 'status error';
            }
        }

        async function testCreateTrainer() {
            log('=== TESTING TRAINER CREATION ===');
            const token = localStorage.getItem('token');

            if (!token) {
                log('✗ No token found! Login first.');
                const status = document.getElementById('trainerStatus');
                status.style.display = 'flex';
                document.getElementById('trainerStatusValue').textContent = 'ERROR: No token';
                document.getElementById('trainerStatusValue').className = 'status error';
                return;
            }

            log(`Token found: ${token.substring(0, 30)}...`);

            const trainerEmail = document.getElementById('trainerEmail').value || 
                `test${Math.random().toString(36).substr(2, 9)}@gym.test`;

            const trainerData = {
                first_name: document.getElementById('firstName').value,
                last_name: document.getElementById('lastName').value,
                email: trainerEmail,
                phone: document.getElementById('phone').value,
                specialization: document.getElementById('specialization').value,
                hourly_rate: parseFloat(document.getElementById('hourlyRate').value)
            };

            log(`Trainer data: ${JSON.stringify(trainerData, null, 2)}`);

            const apiDetails = document.getElementById('apiDetails');
            apiDetails.value = `
URL: /api/v1/trainers
Method: POST
Headers:
  Content-Type: application/json
  Authorization: Bearer ${token.substring(0, 30)}...
  
Body:
${JSON.stringify(trainerData, null, 2)}`;

            try {
                log(`Sending POST /api/v1/trainers...`);
                const response = await fetch('/api/v1/trainers', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${token}`
                    },
                    body: JSON.stringify(trainerData)
                });

                log(`Response status: ${response.status}`);
                const result = await response.json();
                log(`Response: ${JSON.stringify(result, null, 2)}`);

                if (result.success && response.status === 201) {
                    log(`✓ Trainer created successfully`);
                    const status = document.getElementById('trainerStatus');
                    status.style.display = 'flex';
                    document.getElementById('trainerStatusValue').textContent = `SUCCESS - Trainer ID: ${result.data.id}`;
                    document.getElementById('trainerStatusValue').className = 'status success';
                } else {
                    throw new Error(result.message || `HTTP ${response.status}`);
                }
            } catch (error) {
                log(`✗ Error: ${error.message}`);
                const status = document.getElementById('trainerStatus');
                status.style.display = 'flex';
                document.getElementById('trainerStatusValue').textContent = `ERROR: ${error.message}`;
                document.getElementById('trainerStatusValue').className = 'status error';
            }
        }

        // Initial display update
        updateStorageDisplay();
    </script>
</body>
</html>
