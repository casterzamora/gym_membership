name: Tests

on:
  push:
    branches:
      - master
      - '*.x'
  pull_request:
  schedule:
    - cron: '0 0 * * *'

permissions:
  contents: read

jobs:
  tests:
    runs-on: ubuntu-latest
    services:
      mysql:
        image: mysql:8
        ports:
          - 3306:3306
        env:
          MYSQL_ROOT_PASSWORD: password
          MYSQL_DATABASE: gym_testing
        options: --health-cmd="mysqladmin ping --silent" --health-interval=10s --health-timeout=5s --health-retries=3

    strategy:
      fail-fast: true
      matrix:
        php: [8.2, 8.3, 8.4]

    name: PHP ${{ matrix.php }}
    env:
      DB_CONNECTION: mysql
      DB_HOST: 127.0.0.1
      DB_PORT: 3306
      DB_DATABASE: gym_testing
      DB_USERNAME: root
      DB_PASSWORD: password

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          extensions: dom, curl, libxml, mbstring, zip, pcntl, pdo, pdo_mysql, sqlite, pdo_sqlite
          coverage: none

      - name: Install Composer dependencies
        run: composer install --prefer-dist --no-interaction --no-progress

      - name: Copy environment file
        run: cp .env.example .env

      - name: Set DB env for CI
        run: |
          # ensure .env exists (copied above)
          sed -i 's/^DB_CONNECTION=.*/DB_CONNECTION=mysql/' .env || true
          sed -i 's/^# DB_HOST=.*/DB_HOST=127.0.0.1/' .env || true
          sed -i 's/^# DB_PORT=.*/DB_PORT=3306/' .env || true
          sed -i 's/^# DB_DATABASE=.*/DB_DATABASE=gym_testing/' .env || true
          sed -i 's/^# DB_USERNAME=.*/DB_USERNAME=root/' .env || true
          sed -i 's/^# DB_PASSWORD=.*/DB_PASSWORD=password/' .env || true

      - name: Wait for MySQL
        run: |
          sudo apt-get update -y
          sudo apt-get install -y default-mysql-client
          until mysql -h 127.0.0.1 -u root -ppassword -e "SELECT 1"; do
            echo "Waiting for MySQL..."
            sleep 1
          done

      - name: Generate app key
        run: php artisan key:generate

      - name: Execute tests
        run: php artisan test
